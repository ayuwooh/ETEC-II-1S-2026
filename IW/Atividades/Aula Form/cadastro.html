<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <nav>
      <a href="index.html">Voltar</a>
    </nav>
    <main>
      <div class="container2">
        <h2>Cadastro de Usuário</h2>
        <form>
          <fieldset>
            <legend>Dados Pessoais</legend>
            <label>Nome:</label>
            <input type="text" required />
            <br />
            <label>E-mail:</label>
            <input type="email" required />
            <br />
            <label>Telefone:</label>
            <input type="tel" placeholder="(00)0000-0000" required />
            <br />
            <label>CPF:</label>
            <input type="text" maxlength="11" required />
            <br />
            <label>Data de Nascimento:</label>
            <input type="date" required />
            </fieldset>
          </fieldset>
          <fieldset>
            <legend>Endereço</legend>
            <label>Rua:</label>
            <input type="text" required />
            <br />
            <label>Número:</label>
            <input type="number" required />
            <br />
            <label>Complemento:*</label>
            <input type="text" />
            <br />
            <label>Cidade:</label>
            <input type="text" required />
            <br />
            <label>Estado:</label>
            <select name="Estado" id="01">
              <option>SP</option>
              <option>RJ</option>
              <option>PA</option>
              <option>MG</option>
              <option>SC</option>
              <option>AL</option>
            </select>
          </fieldset>
          <fieldset>
            <legend>Informações Adicionais</legend>
            <label>Sexo:</label>
            <input type="radio" name="sexo" class="inline" />Masculino
            <input type="radio" name="sexo" class="inline" />Feminino
            <input type="radio" name="sexo" class="inline" />Outro
            <br />
            <label>Hobbies:</label>
            <input type="checkbox" name="hobby" class="inline" />Jogos
            <input type="checkbox" name="hobby" class="inline" />Arte
            <input type="checkbox" name="hobby" class="inline" />Leitura
            <br />
            <label>Observações:</label>
            <textarea rows="1"></textarea>
          </fieldset>
          <br />
          <input type="submit" class="submit" />
        </form>
      </div>
    </main>
  </body>
</html>
